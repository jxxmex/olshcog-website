<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OLSHCOG - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            width: 400px;
        }
        h1 { color: #8b1e3f; text-align: center; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #8b1e3f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .error { color: red; font-size: 12px; }
        a { color: #8b1e3f; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Login</h1>
        <p style="text-align:center">Our Lady of the Sacred Heart College of Guimba</p>
        
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <div id="message"></div>
        <button onclick="login()">Login</button>
        <p style="text-align:center; margin-top:20px">No account? <a href="index.html">Register here</a></p>
    </div>

    <script>
        function login() {
            let username = document.getElementById('username').value;
            let password = document.getElementById('password').value;
            let msg = document.getElementById('message');
            
            if (!username || !password) {
                msg.innerHTML = '<span class="error">Please enter username and password!</span>';
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('olshcog_users') || '[]');
            let user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                localStorage.setItem('olshcog_current_user', JSON.stringify(user));
                window.location.href = 'main.html';
            } else {
                msg.innerHTML = '<span class="error">Invalid username or password!</span>';
            }
        }
    </script>
</body>
</html>
