<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Our Lady of the Sacred Heart College of Guimba</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e9eef3 100%);
      font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-container {
      max-width: 440px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      border-top: 5px solid #8b1e3f;
    }

    .login-header {
      background: #8b1e3f;
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .login-header h1 {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .login-body {
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #1e2f3a;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 30px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #8b1e3f;
    }

    .btn-login {
      width: 100%;
      background: #8b1e3f;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.2s;
    }

    .btn-login:hover {
      background: #6b1730;
    }

    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #5a6e7a;
    }

    .register-link a {
      color: #8b1e3f;
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .error-msg {
      color: #dc3545;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }

    .school-badge {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #8b1e3f;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🔐 Welcome Back</h1>
      <p>Our Lady of the Sacred Heart College of Guimba</p>
    </div>
    <div class="login-body">
      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <div id="errorMsg" class="error-msg"></div>
        <button type="submit" class="btn-login">🔓 Login to Portal</button>
      </form>
      <div class="register-link">
        Don't have an account? <a href="index.html">Register here</a>
      </div>
      <div class="school-badge">
        Veritas · Caritas · Servitium | Est. 1947
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');

    function getUsers() {
      const users = localStorage.getItem('olshcog_users');
      return users ? JSON.parse(users) : [];
    }

    function setCurrentUser(user) {
      localStorage.setItem('olshcog_current_user', JSON.stringify(user));
    }

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      errorMsg.innerHTML = '';
      
      if (!username || !password) {
        errorMsg.innerHTML = 'Please enter username and password!';
        return;
      }
      
      const users = getUsers();
      const user = users.find(u => u.username === username && u.password === password);
      
      if (user) {
        setCurrentUser({ id: user.id, fullname: user.fullname, username: user.username, email: user.email });
        window.location.href = 'main.html';
      } else {
        errorMsg.innerHTML = 'Invalid username or password!';
      }
    });
  </script>
</body>
</html>
