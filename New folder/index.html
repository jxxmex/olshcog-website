<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Our Lady of the Sacred Heart College of Guimba</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #e9eef3 100%);
      font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .register-container {
      max-width: 480px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      border-top: 5px solid #8b1e3f;
    }

    .register-header {
      background: #8b1e3f;
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .register-header h1 {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }

    .register-header p {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .register-body {
      padding: 2rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #1e2f3a;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 30px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #8b1e3f;
    }

    .btn-register {
      width: 100%;
      background: #8b1e3f;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.2s;
    }

    .btn-register:hover {
      background: #6b1730;
    }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #5a6e7a;
    }

    .login-link a {
      color: #8b1e3f;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .error-msg {
      color: #dc3545;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }

    .success-msg {
      color: #28a745;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }

    .school-badge {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #8b1e3f;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-header">
      <h1>🙏 Create Account</h1>
      <p>Our Lady of the Sacred Heart College of Guimba</p>
    </div>
    <div class="register-body">
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullname" placeholder="e.g., Juan M. Dela Cruz" required>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="youremail@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="At least 4 characters" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
        </div>
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
        <button type="submit" class="btn-register">📝 Register Now</button>
      </form>
      <div class="login-link">
        Already have an account? <a href="login.html">Login here</a>
      </div>
      <div class="school-badge">
        Veritas · Caritas · Servitium | Est. 1947
      </div>
    </div>
  </div>

  <script>
    const registerForm = document.getElementById('registerForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    function getUsers() {
      const users = localStorage.getItem('olshcog_users');
      return users ? JSON.parse(users) : [];
    }

    function saveUsers(users) {
      localStorage.setItem('olshcog_users', JSON.stringify(users));
    }

    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const fullname = document.getElementById('fullname').value.trim();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      errorMsg.innerHTML = '';
      successMsg.innerHTML = '';
      
      if (!fullname || !username || !email || !password) {
        errorMsg.innerHTML = 'All fields are required!';
        return;
      }
      
      if (password !== confirmPassword) {
        errorMsg.innerHTML = 'Passwords do not match!';
        return;
      }
      
      if (password.length < 4) {
        errorMsg.innerHTML = 'Password must be at least 4 characters!';
        return;
      }
      
      const users = getUsers();
      
      if (users.find(u => u.username === username)) {
        errorMsg.innerHTML = 'Username already exists!';
        return;
      }
      
      if (users.find(u => u.email === email)) {
        errorMsg.innerHTML = 'Email already registered!';
        return;
      }
      
      const newUser = {
        id: Date.now(),
        fullname: fullname,
        username: username,
        email: email,
        password: password,
        createdAt: new Date().toISOString()
      };
      
      users.push(newUser);
      saveUsers(users);
      
      successMsg.innerHTML = 'Registration successful! Redirecting to login...';
      
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    });
  </script>
</body>
</html>
